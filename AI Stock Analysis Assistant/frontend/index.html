<!doctype html>
<!--
  AI Stock Analysis Assistant - HTML Entry Point

  This is the main HTML file that serves as the entry point
  for the React application. The React app is mounted to
  the #root element.

  Author: AI Stock Analysis Team
  Version: 1.0.0
-->
<html lang="en">
  <head>
    <!-- Character encoding for proper text rendering -->
    <meta charset="UTF-8" />

    <!-- Favicon for browser tab -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />

    <!-- Responsive viewport configuration for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO Meta Tags -->
    <meta name="description" content="AI-powered stock analysis assistant that provides real-time stock prices, historical data, balance sheets, and news." />
    <meta name="keywords" content="stock, analysis, AI, assistant, finance, investment" />
    <meta name="author" content="AI Stock Analysis Team" />

    <!-- Page Title -->
    <title>AI Stock Analysis Assistant</title>
  </head>
  <body>
    <!--
      Root Element
      This is where the React application will be mounted.
      The entire UI is rendered inside this div by React.
    -->
    <div id="root"></div>

    <!--
      Main Application Script
      This loads the React application entry point.
      Using type="module" for ES module support.
    -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
